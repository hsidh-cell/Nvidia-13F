name: Refresh 13F
on:
  schedule: [{ cron: "0 12 * * *" }]
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python sec_ingest.py --html nvidia-13f-dashboard.html --contact "sidhu.hartaj@gmail.com"
      - run: |
          git config user.name  "13f-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json nvidia-13f-dashboard.html
          git diff --cached --quiet || git commit -m "chore: refresh 13F data"
          git push
